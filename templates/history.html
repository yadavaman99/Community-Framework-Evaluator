<!DOCTYPE html>
<html>
<head>
    <title>Database Records</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #6366f1; font-size: 12px; text-transform: uppercase; }
        .del-btn { color: #ef4444; text-decoration: none; font-weight: bold; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #6366f1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← BACK TO DASHBOARD</a>
    <h2>Evaluation History</h2>
    <table>
        <tr>
            <th>Framework</th>
            <th>Index</th>
            <th>Verdict</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.app_name }}</td>
            <td style="color:#6366f1; font-weight:bold;">{{ item.total }}</td>
            <td>{{ item.verdict }}</td>
            <td style="color:#94a3b8; font-size:12px;">{{ item.timestamp }}</td>
            <td><a href="/delete/{{ item.id }}" class="del-btn">DELETE</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
