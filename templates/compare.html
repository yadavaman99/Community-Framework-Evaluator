<!DOCTYPE html>
<html>
<head>
    <title>Compare Apps</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 40px; display: flex; gap: 20px; }
        .compare-card { flex: 1; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; border: 2px solid #4facfe; }
        h2 { border-bottom: 2px solid #4facfe; padding-bottom: 10px; }
    </style>
</head>
<body>
    {% for app in apps %}
    <div class="compare-card">
        <h2>{{ app.name }}</h2>
        <p><strong>Primary Category:</strong> {{ app.cat }}</p>
        <p><strong>Study Rating:</strong> {{ app.impact }}</p>
        <hr>
        <p><strong>Safety:</strong> {{ app.safety|join(', ') }}</p>
        <p><strong>Risks:</strong> {{ app.risks|join(', ') }}</p>
        <a href="/history" style="color:#ffd369; text-decoration:none; font-size:12px;">← Back to Dashboard</a>
    </div>
    {% endfor %}
</body>
</html>
